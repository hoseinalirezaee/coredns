name: Release

on:
  workflow_run:
    workflows: ["Go Tests"]
    types: [completed]
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit (e.g., 52f0348)"
        default: "master"

permissions:
  contents: read

jobs:
  release:
    name: Release
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.commit || github.event.workflow_run.head_sha }}
          persist-credentials: false
      - name: Set up info
        env:
          INPUT_COMMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.commit || github.event.workflow_run.head_sha }}
        run: |
          set -x -e
          VERSION=$(make -f Makefile.release version)
          COMMIT=$(git rev-parse --quiet --verify "${INPUT_COMMIT}")
          SHORT_SHA=$(git rev-parse --short "${COMMIT}")
          if [[ "$(git tag -l ${SHORT_SHA})" == "${SHORT_SHA}" ]]; then
            echo "${SHORT_SHA} already released"
            exit 1
          fi
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        id: info
      - name: Build release binary
        run: make -f Makefile.release release
      - name: Build release binary sha256
        run: (cd release; for asset in `ls -A *.tgz *.zip`; do sha256sum $asset > $asset.sha256; done)
      - name: Remove hidden section
        env:
          VERSION: ${{ steps.info.outputs.version }}
        run: sed '/+++/,//d' "notes/coredns-${VERSION}.md" > release.md
      - name: Log release info
        env:
          COMMIT: ${{ steps.info.outputs.commit }}
          SHORT_SHA: ${{ steps.info.outputs.short_sha }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          set -x -e
          git log -1
          echo "${COMMIT}"
          echo "${SHORT_SHA}"
          echo "${VERSION}"
          cat release.md
          sha256sum release/*.tgz release/*.zip
      - name: Draft release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          body_path: release.md
          name: v${{ steps.info.outputs.version }}
          tag_name: ${{ steps.info.outputs.short_sha }}
          target_commitish: ${{ steps.info.outputs.commit }}
          files: |
            release/*.tgz
            release/*.tgz.sha256
            release/*.zip
            release/*.zip.sha256
          draft: true
