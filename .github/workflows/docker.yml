name: Docker Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release:
        description: "Release (e.g., v1.9.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  docker-release:
    runs-on: ubuntu-latest
    env:
      RELEASE: ${{ github.event.inputs.release || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Build Docker Images
        run: make VERSION=${RELEASE:1} DOCKER=ghcr.io/${{ github.repository_owner }} -f Makefile.docker release
      - name: Show Docker Images
        run: docker images
      - name: GHCR login
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Docker Images
        run: make VERSION=${RELEASE:1} DOCKER=ghcr.io/${{ github.repository_owner }} -f Makefile.docker docker-push
